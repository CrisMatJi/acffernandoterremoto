<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: redirect preservando la ruta como ?p= param
      var base = '/acffernandoterremoto'
      var path = window.location.pathname.replace(base, '') || '/'
      window.location.replace(
        window.location.origin + base +
        '/?p=' + encodeURIComponent(path + window.location.search) +
        window.location.hash
      )
    </script>
  </head>
  <body></body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: redirect preservando la ruta como ?p= param
      window.location.replace(
        window.location.origin +
        '/?p=' + encodeURIComponent(window.location.pathname + window.location.search) +
        window.location.hash
      )
    </script>
  </head>
  <body></body>
</html>
